<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IO Growth — Logo System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --charcoal: #2D2F3A;
    --orange: #F5922A;
    --light: #F4F4F5;
    --mid: #6B6D7B;
    --white: #FFFFFF;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--light);
    color: var(--charcoal);
    padding: 48px 24px 80px;
  }
  .header {
    text-align: center;
    margin-bottom: 56px;
  }
  .header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 6px;
  }
  .header p {
    font-size: 12px;
    color: #aaa;
  }
  .grid {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .card {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .card-label {
    background: var(--white);
    padding: 14px 24px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-label .title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mid);
  }
  .card-label .detail {
    font-size: 11px;
    color: #bbb;
  }
  .pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 52px 40px;
    min-height: 160px;
  }
  .cell.light { background: var(--white); border-right: 1px solid #eee; }
  .cell.dark { background: var(--charcoal); }
  .cell.orange { background: var(--orange); }
  .cell.gray { background: #E0E1E5; }
  .cell svg { display: block; }
  .quad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
  }
  .quad .cell {
    padding: 36px 24px;
    min-height: 130px;
  }
  .quad .cell svg {
    width: 60px;
    height: 60px;
  }
  .quad .cell:not(:last-child) { border-right: 1px solid rgba(0,0,0,0.06); }
  .quad .cell.dark:not(:last-child) { border-right-color: rgba(255,255,255,0.06); }
  .quad .cell.orange:not(:last-child) { border-right-color: rgba(255,255,255,0.15); }
  .palette {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
  .swatch {
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--white);
    border-right: 1px solid #eee;
  }
  .swatch:last-child { border-right: none; }
  .swatch-color {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .swatch-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--charcoal);
  }
  .swatch-hex {
    font-size: 11px;
    color: #aaa;
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  }
  @media (max-width: 640px) {
    .pair { grid-template-columns: 1fr; }
    .quad { grid-template-columns: 1fr 1fr; }
    .palette { grid-template-columns: 1fr; }
    .cell { padding: 40px 24px; }
    .cell.light { border-right: none; border-bottom: 1px solid #eee; }
  }
</style>
</head>
